name: Python package

on: [push]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68.0" "wheel>=0.41"
          pip install -r requirements.txt
      - name: Test with pytest (excluding lstar)
        run: |
          python -m pytest tests --ignore=tests/test_lstar.py
      - name: Lint with pylint
        run: |
          python -m pylint orthogonal_dfa setup.py tests
          isort orthogonal_dfa tests; black orthogonal_dfa tests; bash -c '[ $(git status --porcelain --untracked-files=no | wc -c) -eq 0 ]  || (git status; git diff; exit 1)'

  discover-lstar-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.discover.outputs.tests }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68.0" "wheel>=0.41"
          pip install -r requirements.txt
      - name: Discover lstar tests
        id: discover
        run: |
          tests=$(python -m pytest tests/test_lstar.py --collect-only -q 2>/dev/null | grep '::' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  lstar-test:
    needs: discover-lstar-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-lstar-tests.outputs.tests) }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=68.0" "wheel>=0.41"
          pip install -r requirements.txt
      - name: Run ${{ matrix.test }}
        run: |
          python -m pytest "${{ matrix.test }}" -v

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Check that the docs build
        run: |
          cd docs && make html
